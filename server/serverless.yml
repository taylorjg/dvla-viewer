service: dvla-viewer

build:
  esbuild:
    bundle: true
    minify: true

provider:
  name: aws
  profile: taylorjg
  runtime: nodejs24.x
  environment:
    API_KEY: ${env:API_KEY}
  httpApi:
    cors: true

functions:
  search:
    handler: lookup.handler
    events:
      - httpApi:
          method: get
          path: /api/lookup
