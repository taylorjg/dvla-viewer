org: taylorjg
app: dvla-viewer
service: dvla-viewer

build:
  esbuild: false

provider:
  name: aws
  runtime: nodejs18.x
  environment:
    API_KEY: ${param:apiKey}
  httpApi:
    cors: true

plugins:
  - serverless-webpack

functions:
  search:
    handler: lookup.handler
    events:
      - httpApi:
          method: get
          path: /api/lookup
